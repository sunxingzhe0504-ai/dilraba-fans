name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/deploy.yml"
      - "content/**"
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "postcss.config.mjs"
      - "tsconfig.json"
      - "scripts/**"
      - "eslint.config.mjs"
      - "AGENTS.md"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Pages URL
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [[ "$REPO" == *.github.io ]]; then
            echo "BASE_PATH=" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_SITE_URL=https://${OWNER}.github.io" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=/${REPO}" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_SITE_URL=https://${OWNER}.github.io/${REPO}" >> "$GITHUB_ENV"
          fi
          echo "GITHUB_PAGES=true" >> "$GITHUB_ENV"

      - run: npm ci
      - run: npm run lint
      - run: npm run validate
      - run: npm run build

      - name: Disable Jekyll on GitHub Pages
        run: touch out/.nojekyll

      # Merge static export into master root so existing "Deploy from branch / master / (root)"
      # serves index.html instead of rendering README.md with Jekyll.
      - name: Publish static site to master root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: master
          keep_files: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "chore(pages): deploy static site to master root"

      - name: Publish to gh-pages branch (clean hosting copy)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true

      - name: Point GitHub Pages at gh-pages branch when possible
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API="https://api.github.com/repos/${{ github.repository }}/pages"
          BODY='{"source":{"branch":"gh-pages","path":"/"},"build_type":"legacy"}'
          code=$(curl -sS -o /tmp/pages-gh.json -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API}" -d "${BODY}" || true)
          if [ "${code}" = "404" ]; then
            curl -sf -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${API}" -d "${BODY}" || true
          fi
